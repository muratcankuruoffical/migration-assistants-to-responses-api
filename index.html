## Why This Migration

OpenAI is deprecating the Assistants API (threads, runs, assistants) and replacing it with the Responses API. The announcement is on the OpenAI Agents page with a shutdown date of **August 26, 2026**. The Responses API is simpler (no polling), supports conversation chaining via `previous_response_id`, and has built-in tools (file_search, web_search, function calling) without needing persistent assistant objects.

## Current Architecture

### OpenAI Resource Layer (`src/support/Services/OpenAI/Resources/`)

#### `Threads.php`
- `create()` → `$client->threads()->create()`
- `addMessage(threadId, content)` → `$client->threads()->messages()->create()`
- `run(threadId, assistantId)` → `$client->threads()->runs()->create()`
- `getRunStatus(threadId, runId)` → `$client->threads()->runs()->retrieve()`
- `getMessages(threadId)` → `$client->threads()->messages()->list()`
- `delete(threadId)` → `$client->threads()->delete()`
- `waitForRunCompletion(threadId, runId)` → polling loop (sleep + retry)

#### `Tools.php`
- `runWithFunctionCalling(assistantId, threadId, message, tools, dataCollectionSchema)`:
  1. Adds message to thread
  2. Builds tool definitions (file_search + function tools + summarize_conversation + data_collection)
  3. Creates run with `$client->threads()->runs()->create()`
  4. Calls `handleRunCompletion()` which polls run status
  5. On `requires_action` status → `handleToolCalls()` → executes functions → submits tool outputs via `$client->threads()->runs()->submitToolOutputs()`
  6. Returns text from last assistant message
- `executeFunction()` routes to: `handleSummarizeConversation`, `handleAgentTransfer`, `handleDataCollection`, or `makeWebhookCall`
- `generateConversationSummary()` uses `$client->chat()->create()` with gpt-5 model
- `create()` and `update()` are local-only (generate function schemas, no API calls)
- `getToolsForAssistant(toolIds)` loads Tool models and formats for OpenAI
- `makeWebhookCall(tool, arguments, context)` executes HTTP calls to user-defined endpoints
- `trackToolUsage(data)` records usage in `tool_usages` table
- `buildDataCollectionTool(schema)` creates the save_collected_data function definition
- `buildSummarizeConversationFunction()` creates the summarize function definition

#### `EmailProcessor.php`
- `generateReplyWithAssistant(assistantId, message, threadId)`:
  1. Creates thread if needed
  2. Adds message
  3. Runs assistant
  4. Waits for completion
  5. Gets last assistant message

#### `Assistants.php`
- `create(AgentData, instructions, model)`:
  1. Creates vector store: `$client->vectorStores()->create()`
  2. Creates assistant: `$client->assistants()->create()` with file_search tool
  3. Returns: `assistant_id`, `vector_store_id`, `name`, `instructions`, `model`
- `get(assistantId)` → `$client->assistants()->retrieve()`
- `update(assistantId, AgentData)`:
  1. Retrieves assistant to get vector_store_id
  2. Manages vector store files (add/remove)
  3. Syncs tools locally
  4. Syncs knowledge bases
  5. Calls `$client->assistants()->modify()` with updated config
  6. Builds summarize_conversation and transfer_to_agent function definitions
- `delete(assistantId)`:
  1. Retrieves assistant for vector_store_id
  2. Deletes vector store
  3. Deletes assistant
- Vector store file management methods (keep these — independent of assistants):
  - `updateVectorStoreFiles()`
  - `ensureKnowledgeBasePartExistsInVectorStore()`
  - `uploadKnowledgeBaseToOpenAI()`

#### `KnowledgeBase.php`
- File upload/management via `$client->files()` — completely independent of assistants, no changes needed

## Responses API Overview

### Core Concepts

```php
// Basic response creation
$response = $client->responses()->create([
    'model' => 'gpt-4.1',
    'instructions' => 'You are a helpful assistant.',  // replaces assistant instructions
    'input' => 'User message here',                    // replaces thread message
    'tools' => [                                        // replaces assistant tools
        ['type' => 'file_search', 'vector_store_ids' => ['vs_xxx']],
        ['type' => 'function', 'name' => 'my_func', ...],
    ],
    'previous_response_id' => 'resp_xxx',              // replaces thread (conversation chaining)
    'store' => true,                                    // required for previous_response_id to work
    'tool_choice' => 'auto',
]);

// Response object properties:
$response->id;           // 'resp_xxx' — store this for conversation chaining
$response->status;       // 'completed' | 'failed' | 'incomplete'
$response->output;       // array of OutputMessage, OutputFunctionToolCall, etc.
$response->outputText;   // convenience: concatenated text from output messages
$response->usage;        // CreateResponseUsage object (inputTokens, outputTokens)
```

### Function Calling (Key Difference)

**Before (Assistants API):**
1. Create run → 2. Poll status → 3. Status = `requires_action` → 4. Extract tool_calls → 5. Execute → 6. Submit tool outputs → 7. Poll again → 8. Repeat

**After (Responses API):**
1. Create response → 2. Check output for `OutputFunctionToolCall` items → 3. Execute → 4. Create NEW response with function_call_output input + `previous_response_id` → 5. Repeat

```php
// Step 1: Initial response (may contain function calls in output)
$response = $client->responses()->create([
    'model' => 'gpt-4.1',
    'input' => 'What is the weather?',
    'tools' => [$weatherFunctionTool],
    'store' => true,
]);

// Step 2: Check for function calls
$functionCalls = [];
foreach ($response->output as $item) {
    if ($item instanceof OutputFunctionToolCall) {
        $functionCalls[] = $item;
    }
}

// Step 3: Execute and submit outputs
if (!empty($functionCalls)) {
    $functionOutputs = [];
    foreach ($functionCalls as $call) {
        $result = executeMyFunction($call->name, json_decode($call->arguments, true));
        $functionOutputs[] = [
            'type' => 'function_call_output',
            'call_id' => $call->callId,
            'output' => json_encode($result),
        ];
    }

    // Step 4: New response with function outputs
    $response = $client->responses()->create([
        'model' => 'gpt-4.1',
        'input' => $functionOutputs,
        'previous_response_id' => $response->id,
        'tools' => [$weatherFunctionTool],  // must include same tools
        'store' => true,
    ]);
}

// Final text
$text = $response->outputText;
```

### File Search

```php
// File search tool definition (vector stores are standalone, not assistant-bound)
$fileSearchTool = [
    'type' => 'file_search',
    'vector_store_ids' => ['vs_abc123'],  // pass directly, no assistant needed
];
```

### Multi-Turn Conversations

```php
// Turn 1
$response1 = $client->responses()->create([
    'model' => 'gpt-4.1',
    'instructions' => 'Agent instructions...',
    'input' => 'Hello!',
    'store' => true,
]);

// Turn 2 — automatically has context from Turn 1
$response2 = $client->responses()->create([
    'model' => 'gpt-4.1',
    'instructions' => 'Agent instructions...',
    'input' => 'Follow-up question',
    'previous_response_id' => $response1->id,  // chains to Turn 1
    'store' => true,
]);

// Delete when conversation ends
$client->responses()->delete($response2->id);
```

### Key Properties

| Assistants API | Responses API |
|---------------|---------------|
| `thread_id` | `previous_response_id` |
| `assistant_id` + instructions on server | `instructions` param per request |
| `run_id` | Not needed (synchronous) |
| Polling for completion | Direct response (synchronous) |
| `submitToolOutputs()` | New response with `function_call_output` input |
| `file_search` on assistant | `file_search` tool with `vector_store_ids` per request |

## PHP SDK Support

**Package:** `openai-php/client` v0.19.1 — **fully supports Responses API**

Key SDK classes:
- `$client->responses()->create(array $params): CreateResponse`
- `$client->responses()->retrieve(string $id): RetrieveResponse`
- `$client->responses()->delete(string $id): DeleteResponse`
- `$client->responses()->conversations()` — Conversations API (alternative to previous_response_id)

Response output types (`OpenAI\Responses\Responses\Output\`):
- `OutputMessage` — text response (has `content` array with `OutputMessageContentOutputText`)
- `OutputFunctionToolCall` — function call (has `name`, `arguments`, `callId`, `id`, `status`)
- `OutputFileSearchToolCall` — file search result
- `OutputReasoning` — reasoning trace (for o3/o4 models)

Accessed via:
```php
$response = $client->responses()->create([...]);
$response->id;         // string, e.g., 'resp_xxx'
$response->outputText; // string|null, convenience property
$response->output;     // array of output items
$response->status;     // 'completed'|'failed'|'in_progress'|'incomplete'
$response->usage;      // CreateResponseUsage
```

## Migration Plan

### Step 1: Create New `Responses` Resource Class

**Create:** `src/support/Services/OpenAI/Resources/Responses.php`

This is the core new file. It replaces `Threads.php` + `EmailProcessor.php` and absorbs the run/function-calling logic from `Tools.php`.

**Main method signature:**
```php
public function createResponseWithFunctionCalling(
    string $agentId,        // local Agent UUID
    string $message,        // user input
    ?string $previousResponseId,  // for conversation chaining
    string $model,          // e.g., 'gpt-4.1'
    string $instructions,   // agent prompt text
    array $availableToolIds = [],
    array $dataCollectionSchema = [],
    ?string $vectorStoreId = null,
    array $transferRules = []
): array
```

**Returns:**
```php
[
    'content' => string,              // assistant reply text
    'response_id' => string,          // for conversation chaining
    'model' => string,
    'usage' => array,
    'transfer' => ?array,             // transfer data if agent transfer triggered
    'collected_data' => ?array,       // data collection results
    'conversation_summary' => ?string // summary if conversation ended
]
```

**Logic (function calling loop):**
1. Build tools array: file_search (with vector_store_ids), external function tools, summarize_conversation, transfer_to_agent (if transfer_rules), save_collected_data (if dataCollectionSchema)
2. Call `$client->responses()->create(...)` with `store => true`
3. Check `$response->output` for `OutputFunctionToolCall` items
4. If function calls found:
   a. Execute each (reuse webhook/internal handler logic from current Tools.php)
   b. Build `function_call_output` input items
   c. Call `$client->responses()->create(...)` with `previous_response_id` + function outputs
   d. Repeat (max 10 iterations)
5. Extract text from final response's `outputText`
6. Return result array

**Migrate these methods from `Tools.php`:**
- `executeFunction()` — routes to internal handlers or webhook
- `handleSummarizeConversation()` — stores summary
- `handleAgentTransfer()` — handles transfer logic
- `handleDataCollection()` — stores collected fields
- `makeWebhookCall()` — HTTP calls to user endpoints
- `trackToolUsage()` — database logging
- `getToolsForAssistant()` — loads Tool models and formats schemas
- `buildDataCollectionTool()` — save_collected_data schema
- `buildSummarizeConversationFunction()` — from both Tools.php and Assistants.php

**Migrate from `Assistants.php`:**
- `buildTransferToAgentFunction()` — transfer_to_agent schema

**Also include:**
- `delete(string $responseId): bool` — for cleanup command

### Step 3: Update Service Layer

**Modify:** `src/support/Services/AI/AIServiceInterface.php`
```php
interface AIServiceInterface {
    public function generateEmailReply(
        string $agentId,                  // was: assistantId
        string $message,                  // was: originalEmail
        ?string $previousResponseId = null,  // was: threadId
    ): AIResponseData;
}
```

**Modify:** `src/support/Services/AI/OpenAIService.php`

New `generateEmailReply()` implementation:
1. Resolve Agent model from `$agentId` (check both `id` and `openai_id` for backward compat)
2. Read instructions: `$agent->conversation_config['agent']['prompt']['prompt']`
3. Read model: `$agent->platform_settings['model'] ?? 'gpt-4.1'`
4. Read vector_store_id: `$agent->platform_settings['vector_store_id']`
5. Read tool IDs and data collection schema (same logic as current `getAvailableToolsForAssistant` and `getDataCollectionSchema`)
6. Read transfer rules from agent
7. Call `$this->openAI->responses()->createResponseWithFunctionCalling(...)`
8. Return `AIResponseData` with metadata: `['response_id' => ..., 'tools_used' => ..., ...]`

**No more branching between "has tools" and "no tools" paths** — the Responses API handles everything uniformly.

### Step 4: Update `Assistants.php` (Vector Store Only)

**Modify:** `src/support/Services/OpenAI/Resources/Assistants.php`

**`create()` changes:**
```php
public function create(AgentData $data, ?string $instructions = null, string $model = 'gpt-4.1'): array
{
    // Still create vector store (independent of assistants)
    $vectorStore = $this->client->vectorStores()->create([
        'name' => $data->name . ' Knowledge Base',
    ]);

    // NO MORE: $this->client->assistants()->create(...)

    return [
        // 'assistant_id' => REMOVED
        'vector_store_id' => $vectorStore->id,
        'model' => $model,
        'instructions' => $instructions ?? 'You are a helpful ' . $data->type . ' assistant.',
        'created_at' => now()->toISOString(),
    ];
}
```

**`update()` changes:**
```php
public function update(string $agentId, AgentData $data): array
{
    $localAgent = Agent::where('id', $agentId)->orWhere('openai_id', $agentId)->first();

    // Read vector_store_id from local agent, NOT from assistant
    $vectorStoreId = $localAgent->platform_settings['vector_store_id'] ?? null;

    if (!$vectorStoreId) {
        $vectorStore = $this->client->vectorStores()->create([...]);
        $vectorStoreId = $vectorStore->id;
    }

    // Keep: knowledge base sync, vector store file management, tool sync
    // REMOVE: $this->client->assistants()->retrieve()
    // REMOVE: $this->client->assistants()->modify()
    // REMOVE: buildSummarizeConversationFunction() — moved to Responses
    // REMOVE: buildTransferToAgentFunction() — moved to Responses

    return [
        'vector_store_id' => $vectorStoreId,
        'model' => $localAgent->platform_settings['model'] ?? 'gpt-4.1',
    ];
}
```

**`delete()` changes:**
```php
public function delete(string $agentId): bool
{
    $agent = Agent::where('id', $agentId)->orWhere('openai_id', $agentId)->first();
    $vectorStoreId = $agent?->platform_settings['vector_store_id'] ?? null;

    if ($vectorStoreId) {
        $this->client->vectorStores()->delete($vectorStoreId);
    }

    // NO MORE: $this->client->assistants()->delete()

    return true;
}
```

**Remove:** `get()` method entirely.

## Backward Compatibility

### Existing Conversations
Conversations with `openai_thread_id` in metadata will not be chainable with the new Responses API. When such a conversation is encountered:
- Check for `openai_response_id` first
- If only `openai_thread_id` exists, treat as new conversation (`previousResponseId = null`)
- The first Responses API call starts a new chain
- Context from the old thread is lost, but the agent instructions and any injected context (template, user info) will provide baseline context

### Existing Agents
Agents with `openai_id` pointing to old assistant IDs:
- The field is simply ignored by the new code
- Old assistants on OpenAI can be cleaned up later (optional background job)
- No database migration needed for the agents table

### Token Billing Note
When using `previous_response_id`, all previous input tokens in the chain are billed as input tokens. There are no special discounts for reused context.
